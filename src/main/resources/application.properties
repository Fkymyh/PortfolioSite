# アプリケーション共通設定
spring.application.name=PortfolioSite

# ローカルファイルへ保存するH2データベース設定
spring.datasource.url=jdbc:h2:file:./data/portfolio
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Entityの変更に合わせてテーブル定義を更新
spring.jpa.hibernate.ddl-auto=update

# 管理者パスワードはソースへ書かず、環境変数から受け取る
portfolio.admin.password=${PORTFOLIO_ADMIN_PASSWORD}
