<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title th:text="${pageTitle}">
		お問い合わせ詳細
	</title>

	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<!-- 一覧で選択したお問い合わせの全文を表示します。 -->
	<header th:replace="~{fragments :: header}"></header>

	<main class="container">

		<section class="page-heading">
			<h1>お問い合わせ詳細</h1>
			<p>
				送信されたお問い合わせ内容を確認します。
			</p>
		</section>

		<section class="content-section">

			<div class="detail-heading">
				<h2 th:text="${contactMessage.subject}">
					件名
				</h2>

				<span class="message-id">
					ID:
					<span th:text="${contactMessage.id}">
						1
					</span>
				</span>
			</div>

			<dl class="message-detail-list">
				<div>
					<dt>お名前</dt>
					<dd th:text="${contactMessage.name}">
						お名前
					</dd>
				</div>

				<div>
					<dt>メールアドレス</dt>
					<dd>
						<a th:href="'mailto:' + ${contactMessage.email}" th:text="${contactMessage.email}">
							メールアドレス
						</a>
					</dd>
				</div>

				<div>
					<dt>受信日時</dt>
					<dd th:text="${contactMessage.createdAt}">
						受信日時
					</dd>
				</div>
			</dl>

			<div class="message-full-text">
				<h3>メッセージ</h3>

				<p th:text="${contactMessage.message}">
					メッセージ本文
				</p>
			</div>

			<div class="message-actions">
				<a class="main-button" th:href="@{/admin/messages}">
					一覧へ戻る
				</a>

				<a class="danger-button" th:href="@{/admin/messages/{id}/delete(
				id=${contactMessage.id}
				)}">
					削除する
				</a>
			</div>
		</section>
	</main>

	<footer th:replace="~{fragments :: footer}"></footer>

</body>

</html>
