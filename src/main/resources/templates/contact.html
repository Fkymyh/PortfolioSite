<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
	<meta charset="UTF-8">
	<title th:text="${pageTitle}">お問い合わせ</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<header th:replace="~{fragments :: header}"></header>

	<main class="container">

		<div class="breadcrumb">
			<span th:each="item, stat : ${breadcrumbs}">
				<span th:text="${item}"></span>
				<span th:if="${!stat.last}"> → </span>
			</span>
		</div>

		<section class="page-heading">
			<h1>お問い合わせ・感想フォーム</h1>
			<p>
				このページでは、ポートフォリオサイトや制作物への感想を送信できるフォームを作成する予定です。
				現在は画面構成を作成中です。
			</p>
		</section>

		<section class="content-section">
			<h2>フォーム</h2>

			<form class="contact-form" th:action="@{/contact}" th:object="${contactForm}" method="post">

				<label for="name">お名前</label>
				<input type="text" id="name" th:field="*{name}" placeholder="例：山田 太郎">
				<p class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>

				<label for="email">メールアドレス</label>
				<input type="email" id="email" th:field="*{email}" placeholder="例：sample@example.com">
				<p class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

				<label for="subject">件名</label>
				<input type="text" id="subject" th:field="*{subject}" placeholder="例：ポートフォリオについて">
				<p class="error-message" th:if="${#fields.hasErrors('subject')}" th:errors="*{subject}"></p>

				<label for="message">メッセージ</label>
				<textarea id="message" th:field="*{message}" rows="6" placeholder="感想やお問い合わせ内容を入力してください"></textarea>
				<p class="error-message" th:if="${#fields.hasErrors('message')}" th:errors="*{message}"></p>

				<button type="submit" class="main-button">送信する</button>
			</form>
		</section>

	</main>

</body>

</html>
