<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<body>

	<!-- 全ページで共有するヘッダー。現在ページはcurrentPageで強調します。 -->
	<header class="site-header" th:fragment="header">
		<div class="logo">
			<a th:href="@{/}" class="logo-link">制作物紹介ポートフォリオ</a>
		</div>
		
		<span class="site-window-controls" aria-hidden="true">
		    <span class="window-control minimize">—</span>
		    <span class="window-control maximize">□</span>
		    <span class="window-control close">×</span>
		</span>

		<nav class="header-nav" aria-label="メインナビゲーション">
			<a th:href="@{/}" th:classappend="${currentPage != null and currentPage == 'home'} ? 'active'">
				ホーム
			</a>

			<a th:href="@{/about}" th:classappend="${currentPage != null and currentPage == 'about'} ? 'active'">
				このサイトについて
			</a>

			<a th:href="@{/apps}" th:classappend="${currentPage != null and currentPage == 'apps'} ? 'active'">
				アプリ紹介
			</a>

			<a th:href="@{/learning}" th:classappend="${currentPage != null and currentPage == 'learning'} ? 'active'">
				学習記録
			</a>

			<a th:href="@{/contact}" th:classappend="${currentPage != null and currentPage == 'contact'} ? 'active'">
				お問い合わせ
			</a>
		</nav>
		
		<button type="button" class="theme-toggle" data-theme-toggle aria-pressed="false">
			クラシックモード
		</button>

		<script th:src="@{/js/theme.js}"></script>
	</header>

	<!-- Controllerから受け取った階層を表示する共通パンくずリストです。 -->
	<nav class="breadcrumb" th:fragment="breadcrumb(breadcrumbs)" aria-label="パンくずリスト">

		<ol class="breadcrumb-list">
			<li th:each="item, stat : ${breadcrumbs}" class="breadcrumb-item">

				<span th:if="${!stat.last}">
					<a th:if="${stat.index == 0}" th:href="@{/}" th:text="${item}">
						ホーム
					</a>

					<a th:if="${stat.index == 1 and item == 'アプリ紹介'}" th:href="@{/apps}" th:text="${item}">
						アプリ紹介
					</a>

					<span th:unless="${stat.index == 0
		  			or (stat.index == 1 and item == 'アプリ紹介')}" th:text="${item}">
					</span>
				</span>

				<span th:if="${stat.last}" th:text="${item}" aria-current="page">
				</span>
			</li>
		</ol>

	</nav>

	<!-- 全ページで共有するフッター。クラシック時はタスクバー風になります。 -->
	<footer class="site-footer" th:fragment="footer">
		<div class="footer-inner">
			<div class="footer-info">
				<p class="footer-title">制作物紹介ポートフォリオ</p>
				<p>JavaやPythonを使った制作物と学習記録を紹介しています。</p>
			</div>

			<nav class="footer-nav" aria-label="フッターナビゲーション">
				<a th:href="@{/}">ホーム</a>
				<a th:href="@{/apps}">アプリ紹介</a>
				<a th:href="@{/learning}">学習記録</a>
				<a th:href="@{/contact}">お問い合わせ</a>

				<a href="https://github.com/Fkymyh" target="_blank" rel="noopener noreferrer">
					GitHub
				</a>
			</nav>
		</div>

		<p class="copyright">
			&copy; 2026 制作物紹介ポートフォリオ
		</p>
	</footer>

</body>

</html>
